# ADVANCED Spatial Analysis Configuration
# ========================================
# Extends comprehensive_config.yaml with advanced multi-level spatial analysis
# For use with ComprehensiveTumorSpatialAnalysis class
#
# IMPORTANT: This pipeline uses EXISTING phenotypes from manual gating.
#           It does NOT re-threshold or re-gate cells.
#           Phases 11-18 work with populations already defined in the h5ad file.

# Input/Output
# ------------
input_data: 'manual_gating_output/gated_data.h5ad'
output_directory: 'comprehensive_spatial_analysis_advanced'

# Memory Management
# -----------------
buffer_distance: 500  # μm around each structure
checkpoint_batch_size: 50

# Markers
# -------
tumor_markers:
  - TOM
  - AGFP
  - PERK
  - KI67

immune_markers:
  - CD45
  - CD3
  - CD8B

# Cell Populations (inherit from comprehensive_config.yaml)
# --------------------------------------------------------
populations:
  Tumor:
    markers:
      TOM: true
    color: '#E41A1C'

  Tumor_AGFP_positive:
    markers:
      TOM: true
      AGFP: true
    color: '#377EB8'

  Tumor_AGFP_negative:
    markers:
      TOM: true
      AGFP: false
    color: '#FDB462'

  Tumor_PERK_positive:
    markers:
      TOM: true
      PERK: true
    color: '#4DAF4A'

  Tumor_Ki67_positive:
    markers:
      TOM: true
      KI67: true
    color: '#FF7F00'

  CD45_positive:
    markers:
      CD45: true
    color: '#984EA3'

  T_cells:
    markers:
      CD3: true
    color: '#A65628'

  CD8_T_cells:
    markers:
      CD3: true
      CD8B: true
    color: '#F781BF'

  CD8_Ki67_positive:
    markers:
      CD3: true
      CD8B: true
      KI67: true
    color: '#999999'

  CD8_PERK_positive:
    markers:
      CD3: true
      CD8B: true
      PERK: true
    color: '#B3DE69'

  CD45_CD3_negative:
    markers:
      CD45: true
      CD3: false
    color: '#FCCDE5'

  CD3:
    markers:
      CD3: true
    color: '#A65628'

  CD8:
    markers:
      CD8B: true
    color: '#F781BF'


# Tumor Structure Detection (Phase 1.2)
# --------------------------------------
tumor_structure_detection:
  tumor_population: 'Tumor'
  min_cluster_size: 500
  eps: 100
  min_samples: 10

# Spatial Zones (Phase 1.2)
# --------------------------
spatial_zones:
  margin_width: 50  # μm from tumor edge
  peritumor_inner: 50  # μm
  peritumor_outer: 150  # μm
  distal_threshold: 150  # μm

# Advanced Phase 2.1: pERK Spatial Architecture
# ----------------------------------------------
perk_analysis:
  enabled: true
  cluster_eps: 30  # μm for pERK+ clustering
  cluster_min_samples: 10
  hotspot_radius: 50  # μm for hotspot detection
  ripley_max_distance: 200  # μm for Ripley's K
  ripley_n_steps: 50
  moran_clustering_threshold: 0.3  # Threshold for classifying as "clustered"

# Advanced Phase 2.2: NINJA Escape Mechanism
# -------------------------------------------
ninja_analysis:
  enabled: true
  cluster_eps: 30  # μm for NINJA+ clustering
  cluster_min_samples: 10
  enrichment_radii: [30, 50, 100]  # μm for enrichment analysis
  n_permutations: 1000  # For permutation tests

# Advanced Phase 2.3: Heterogeneity Emergence
# --------------------------------------------
heterogeneity_analysis:
  enabled: true
  markers_for_diversity:
    - PERK
    - AGFP
    - KI67
  entropy_calculation: true
  lisa_analysis: true  # Local Indicators of Spatial Association
  early_timepoint_threshold: 12  # Days
  late_timepoint_threshold: 18  # Days

# Advanced Phase 2.4: Cellular Neighborhood (RCN) Dynamics
# ---------------------------------------------------------
cellular_neighborhoods:
  enabled: true
  populations:
    - Tumor
    - Tumor_NINJA_positive
    - Tumor_PERK_positive
    - Tumor_Ki67_positive
    - CD45_positive
    - T_cells
    - CD8_T_cells
  k_neighbors: 10
  n_rcn_clusters: 8  # Number of recurrent cellular neighborhood types
  subsample_size: 100000
  # Compare groups separately: KPT-cis, KPT-trans, KPNT-cis, KPNT-trans
  separate_group_analysis: true

# Advanced Phase 3.1: Multi-Level Distance Analysis
# --------------------------------------------------
distance_analysis:
  enabled: true
  source_populations:
    - CD8_T_cells
    - T_cells
  target_populations:
    - Tumor_PERK_positive
    - Tumor_NINJA_positive
    - Tumor
  analysis_levels:
    - per_tumor
    - per_sample
    - per_group
  max_distance: 500  # μm

# Advanced Phase 3.2: Infiltration-Tumor Associations
# ----------------------------------------------------
infiltration_associations:
  enabled: true
  infiltration_populations:
    - CD8_T_cells
    - T_cells
    - CD45_positive
  position_classification: true  # peripheral vs central
  spatial_autocorrelation: true

# Advanced Phase 3.3: Pseudo-Temporal Trajectory Analysis
# --------------------------------------------------------
pseudotime_analysis:
  enabled: true
  use_paga: true  # Use PAGA for trajectory inference
  similarity_metric: 'jensen_shannon'  # For tumor-tumor similarity
  features_for_trajectory:
    - phenotype_composition
    - spatial_organization
    - infiltration_density
    - marker_expression
  n_pcs: 15
  n_neighbors: 15

# Infiltration Boundaries (keep existing)
# ----------------------------------------
infiltration_boundaries:
  tumor_population: 'Tumor'
  boundary_widths: [30, 100, 200]

# Immune Infiltration (keep existing)
# ------------------------------------
immune_infiltration:
  populations:
    - CD45_positive
    - T_cells
    - CD8_T_cells

# Statistical Analysis (enhanced)
# --------------------------------
statistical_analysis:
  enabled: true
  alpha: 0.05
  fdr_correction: 'benjamini_hochberg'
  effect_size_reporting: true  # Report Cohen's d
  mixed_effects_models: true  # Account for nested structure
  n_permutations: 1000  # For spatial metrics

# Visualizations (enhanced)
# --------------------------
visualizations:
  enabled: true
  dpi: 300
  format: 'pdf'
  colormap: 'viridis'
  colorblind_friendly: true
  individual_plots: true  # Per-tumor, per-sample plots
  aggregated_panels: true  # Multi-panel figures

  # Specific plot types
  plot_types:
    - phenotype_spatial_maps
    - tumor_structures_with_zones
    - perk_clustering_maps
    - ninja_clustering_maps
    - heterogeneity_heatmaps
    - rcn_temporal_evolution
    - distance_distributions
    - infiltration_associations
    - pseudotime_trajectories

# Performance Optimization
# ------------------------
performance:
  parallel_processing: true
  n_jobs: -1  # Use all available cores
  use_kdtree: true  # Spatial indexing
  chunk_size: 10000  # For large-scale calculations

# Advanced Settings
# -----------------
advanced:
  random_seed: 42
  verbose: true
  save_intermediate_results: true
  create_html_report: true
