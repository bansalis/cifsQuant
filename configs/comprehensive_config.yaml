# COMPREHENSIVE Tumor Spatial Analysis Configuration
# ==================================================
# This configuration runs the COMPLETE analysis with ALL visualizations

# Input/Output
# ------------
input_data: 'manual_gating_output/gated_data.h5ad'
output_directory: 'comprehensive_spatial_analysis'

# Memory Management
# -----------------
buffer_distance: 500  # μm around each structure
checkpoint_batch_size: 50

# Markers
# -------
tumor_markers:
  - TOM
  - AGFP
  - PERK
  - KI67

immune_markers:
  - CD45
  - CD3
  - CD8B

# Cell Populations
# ----------------
populations:
  Tumor:
    markers:
      TOM: true
    color: '#E41A1C'

  Tumor_AGFP_positive:
    markers:
      TOM: true
      AGFP: true
    color: '#377EB8'

  Tumor_AGFP_negative:
    markers:
      TOM: true
      AGFP: false
    color: '#FDB462'

  Tumor_PERK_positive:
    markers:
      TOM: true
      PERK: true
    color: '#4DAF4A'

  Tumor_Ki67_positive:
    markers:
      TOM: true
      KI67: true
    color: '#FF7F00'

  CD45_positive:
    markers:
      CD45: true
    color: '#984EA3'

  T_cells:
    markers:
      CD3: true
    color: '#A65628'

  CD8_T_cells:
    markers:
      CD3: true
      CD8B: true
    color: '#F781BF'

  CD8_Ki67_positive:
    markers:
      CD3: true
      CD8B: true
      KI67: true
    color: '#999999'

  CD8_PERK_positive:
    markers:
      CD3: true
      CD8B: true
      PERK: true
    color: '#B3DE69'

  CD45_CD3_negative:
    markers:
      CD45: true
      CD3: false
    color: '#FCCDE5'

# Tumor Structure Detection
# --------------------------
# Adjusted parameters to detect more structures and allow larger structures
# - Increased eps from 30 to 50 μm to allow more spread-out tumor cells
# - Decreased min_cluster_size from 50 to 30 to capture smaller tumors
# - Kept min_samples at 10 for core point detection
tumor_structure_detection:
  tumor_population: 'Tumor'
  min_cluster_size: 30
  eps: 50
  min_samples: 10

# Infiltration Boundaries
# ------------------------
infiltration_boundaries:
  tumor_population: 'Tumor'
  boundary_widths: [30, 100, 200]

# Immune Infiltration
# -------------------
immune_infiltration:
  populations:
    - CD45_positive
    - T_cells
    - CD8_T_cells
    - CD8_Ki67_positive
    - CD8_PERK_positive
    - CD45_CD3_negative

# Cellular Neighborhoods
# -----------------------
cellular_neighborhoods:
  enabled: true
  populations:
    - Tumor
    - Tumor_AGFP_positive
    - Tumor_PERK_positive
    - Tumor_Ki67_positive
    - CD45_positive
    - T_cells
    - CD8_T_cells
    - CD45_CD3_negative
  window_size: 100
  k_neighbors: 10
  n_clusters: 10
  subsample_size: 100000

# Statistical Analysis
# --------------------
statistical_analysis:
  enabled: true
  alpha: 0.05

# Visualizations
# --------------
visualizations:
  enabled: true

# Advanced
# --------
advanced:
  random_seed: 42
