# Experiment Configuration
# Update paths and slide metadata for your study.

experiment_name: "my_experiment"
data_path: "results"
rawdata_path: "rawdata"
output_path: "spatial_analysis/outputs"

# Sample metadata - add one entry per slide
slides:
  - slide_id: "SAMPLE1"
    group: "GroupA"
    treatment: "treated"
    timepoint: 10

  - slide_id: "SAMPLE2"
    group: "GroupB"
    treatment: "untreated"
    timepoint: 10

# Channel mapping (update to match your markers.csv)
channels:
  dapi: "Channel_1"
  structure_marker: "Channel_2"    # primary structure marker (e.g. tumor)
  immune_marker: "Channel_3"       # pan-immune marker (e.g. CD45)
  t_cell_marker: "Channel_4"       # T cell marker (e.g. CD3)
  # add additional channels as needed

# Analysis parameters
analysis:
  neighborhood_radii: [30, 50, 100]
  min_cells_per_slide: 1000
