# ============================================================================
# SPATIAL QUANTIFICATION CONFIGURATION - SINGLE TIMEPOINT COMPREHENSIVE
# ============================================================================
# Updated: 2025-11-09
# Single timepoint with extensive marker panel (23 markers)

# ============================================================================
# INPUT/OUTPUT
# ============================================================================
input:
  gated_data: 'manual_gating_output/gated_data.h5ad'
  metadata: 'sample_metadata.csv'

output:
  base_directory: 'spatial_quantification_results_advanced_v2'
  save_intermediate: true
  formats: ['png']
  dpi: 300

# ============================================================================
# PLOT CUSTOMIZATION
# ============================================================================
plotting:
  font_family: 'DejaVu Sans'
  font_size: 11
  title_size: 14
  show_stats: true
  stat_method: 'mann_whitney'
  fdr_correction: true
  significance_symbols:
    0.001: '***'
    0.01: '**'
    0.05: '*'
    1.0: 'ns'
  group_colors:
    KPT: '#E41A1C'
    KPNT: '#377EB8'
    cis: '#4DAF4A'
    trans: '#FF7F00'

# ============================================================================
# TUMOR DEFINITION
# ============================================================================
tumor_definition:
  base_phenotype: 'Tumor'
  required_positive: ['TOM']
  required_negative: []
  structure_detection:
    method: 'DBSCAN'
    eps: 1000
    min_samples: 500
    min_cluster_size: 250
    boundary_buffer: 100
    use_expanded_boundary: true
    alpha: 100                  # Alpha parameter for alpha shape boundary
    min_edges: 20               # Minimum edges for boundary filtering
    holes_min_edges: 200   

# ============================================================================
# METADATA CONFIGURATION
# ============================================================================
metadata:
  sample_column: 'sample_id'
  group_column: 'group'
  timepoint_column: 'timepoint'
  additional_groupings:
    - 'genotype'
    - 'main_group'
    - 'treatment'

# ============================================================================
# PHENOTYPE DEFINITIONS
# ============================================================================
phenotypes:
  # ============================================================================
  # TUMOR PHENOTYPES
  # ============================================================================
  Tumor:
    description: "All tumor cells (TOM+)"
    positive: ['TOM']
    negative: []
  
  pERK_positive_tumor:
    description: "pERK+ tumor cells"
    base: 'Tumor'
    positive: ['PERK']
  
  pERK_negative_tumor:
    description: "pERK- tumor cells"
    base: 'Tumor'
    negative: ['PERK']
  
  NINJA_positive_tumor:
    description: "NINJA+ (AGFP+) tumor"
    base: 'Tumor'
    positive: ['NINJA']
  
  NINJA_negative_tumor:
    description: "NINJA- tumor"
    base: 'Tumor'
    negative: ['NINJA']
  
  Ki67_positive_tumor:
    description: "Proliferating tumor"
    base: 'Tumor'
    positive: ['KI67']
  
  PDL1_positive_tumor:
    description: "PD-L1+ tumor (checkpoint)"
    base: 'Tumor'
    positive: ['PDL1']
  
  PDL1_negative_tumor:
    description: "PD-L1- tumor"
    base: 'Tumor'
    negative: ['PDL1']
  
  EPCAM_positive_tumor:
    description: "Epithelial tumor"
    base: 'Tumor'
    positive: ['EPCAM']
    
  EPCAM_negative_tumor:
    description: "Epithelial tumor"
    base: 'Tumor'
    negative: ['EPCAM']
  
  TTF1_positive_tumor:
    description: "TTF1+ lung lineage"
    base: 'Tumor'
    positive: ['TTF1']
  
  TTF1_negative_tumor:
    description: "TTF1- lung lineage"
    base: 'Tumor'
    negative: ['TTF1']

  CC3_positive_tumor:
    description: "Apoptotic tumor"
    base: 'Tumor'
    positive: ['CC3']
  
  CC3_negative_tumor:
    description: "Non-apoptotic tumor"
    base: 'Tumor'
    negative: ['CC3']
  
  MHCII_positive_tumor:
    description: "MHCII tumor"
    base: 'Tumor'
    positive: ['MHCII']
  
  MHCII_negative_tumor:
    description: "Non-MHCII tumor"
    base: 'Tumor'
    negative: ['MHCII']
  
  pERK_NINJA_positive_tumor:
    description: "Double positive"
    base: 'Tumor'
    positive: ['PERK', 'NINJA']
  
  # ============================================================================
  # T CELLS
  # ============================================================================
  CD45_positive:
    description: "All immune cells"
    positive: ['CD45']
    negative: []
  
  T_cells:
    description: "All T cells"
    positive: ['CD3E']
    negative: []
  
  CD8_T_cells:
    description: "CD8+ cytotoxic T cells"
    positive: ['CD3E', 'CD8A']
    negative: []
  
  CD4_T_cells:
    description: "CD4+ helper T cells"
    positive: ['CD3E', 'CD4']
    negative: []

  CD4_Tregs:
    description: "CD4+ regulatory T cells"
    positive: ['CD3E', 'CD4', 'FOXP3']
    negative: []

  PD1_positive_CD8:
    description: "Exhausted CD8+ T cells"
    positive: ['CD3E', 'CD8A', 'PD1']
    negative: []

  # ============================================================================
  # MACROPHAGES
  # ============================================================================
  Macrophages:
    description: "All macrophages"
    positive: ['F480']
    negative: []
  
  MHCII+_macrophages:
    description: "M1 anti-tumor macrophages"
    positive: ['F480', 'MHCII']
    negative: []
  
  MHCII-_macrophages:
    description: "M2 pro-tumor macrophages"
    positive: ['F480']
    negative: ['MHCII']
  
  # ============================================================================
  # OTHER IMMUNE
  # ============================================================================
  B_cells:
    description: "B cells"
    positive: ['B220']
    negative: []

# ============================================================================
# ANALYSIS 0: PER-TUMOR ANALYSIS
# ============================================================================
per_tumor_analysis:
  enabled: true
  use_spatialcells: true
  generate_plots: true

  # Immune populations for per-tumor infiltration counting
  immune_populations:
    - CD45_positive
    - T_cells
    - CD8_T_cells
    - CD4_T_cells
    - CD4_Tregs
    - PD1_positive_CD8
    - Macrophages
    - MHCII+_macrophages
    - MHCII-_macrophages
    - B_cells

  # Clean export filter settings
  export_groups: ['KPT', 'KPNT']
  export_timepoint: 10

  markers:
    - name: 'pERK'
      phenotype: 'pERK_positive_tumor'
    - name: 'NINJA'
      phenotype: 'NINJA_positive_tumor'
    - name: 'Ki67'
      phenotype: 'Ki67_positive_tumor'
    - name: 'EPCAM'
      phenotype: 'EPCAM_positive_tumor'
    - name: 'TTF1'
      phenotype: 'TTF1_positive_tumor'
    - name: 'PD-L1'
      phenotype: 'PD_positive_tumor'
    - name: 'CC3'
      phenotype: 'CC3_positive_tumor'
    - name: 'MHCII'
      phenotype: 'MHCII_positive_tumor'
  
  spatial_heterogeneity:
    enabled: true
    window_size: 300            # Sliding window size in microns
    step_size: 300              # Step size in microns
    min_cells: 10               # Minimum cells per window
    phenotype_col: 'is_Ki67_positive_tumor'

# ============================================================================
# ANALYSIS 1: POPULATION DYNAMICS (CROSS-SECTIONAL)
# ============================================================================
population_dynamics:
  populations:
    # Tumor (10)
    - Tumor
    - pERK_positive_tumor
    - pERK_negative_tumor
    - NINJA_positive_tumor
    - NINJA_negative_tumor
    - Ki67_positive_tumor
    - PDL1_positive_tumor
    - EPCAM_positive_tumor
    - TTF1_positive_tumor
    - CC3_positive_tumor
    - MHCII_positive_tumor
    - MHCII_negative_tumor
    - pERK_NINJA_positive_tumor
    
    # T cells (4)
    - CD45_positive
    - T_cells
    - CD8_T_cells
    - CD4_T_cells
    - CD4_Tregs
    - PD1_positive_CD8

    # Myeloid (3)
    - Macrophages
    - MHCII+_macrophages
    - MHCII-_macrophages

    # Other (1)
    - B_cells

  fractional_populations:
    pERK_positive_tumor: Tumor
    NINJA_positive_tumor: Tumor
    Ki67_positive_tumor: Tumor
    PDL1_positive_tumor: Tumor
    EPCAM_positive_tumor: Tumor
    TTF1_positive_tumor: Tumor
    CC3_positive_tumor: Tumor
    MHCII_positive_tumor: Tumor
    MHCII_negative_tumor: Tumor
    CD8_T_cells: T_cells
    CD4_T_cells: T_cells
    CD4_Tregs: CD4_T_cells
    PD1_positive_CD8: CD8_T_cells
    MHCII+_macrophages: Macrophages
    MHCII-_macrophages: Macrophages

  comparisons:
    - name: 'Group_comparison'
      groups: ['KPT', 'KPNT', 'cis', 'trans']  # Adjust based on actual groups

  metrics:
    - 'count'
    - 'density'
    - 'fraction'

  statistics:
    test_per_timepoint: false  # Single timepoint
    test_method: 'mannwhitneyu'
    alpha: 0.05
    fdr_correction: 'benjamini_hochberg'

# ============================================================================
# ANALYSIS 2: CELL-TO-CELL DISTANCE ANALYSIS
# ============================================================================
distance_analysis:
  enabled: true

  # Restrict source immune cells to within-tumor only (tumor_region_id != -1).
  # This prevents background lung immune cells from inflating mean distances to
  # tumor-expressed markers (pERK+, NINJA+, etc.), making the metric consistent
  # with enhanced_neighborhood_analysis regional infiltration.
  within_tumor_only: true

  # k-nearest neighbors for distance computation.
  # k=5 computes mean distance to 5 nearest targets — reduces bias when target
  # populations differ in density (k=1 always finds NINJA- first if more abundant).
  k_neighbors: 5

  # Maximum distance cap (µm). Source cells with no target within this distance
  # are excluded as non-adjacent. Prevents very distal immune cells from dominating.
  max_distance: 500

  pairings:
    - source: 'CD8_T_cells'
      targets: ['Tumor', 'pERK_positive_tumor', 'pERK_negative_tumor', 
                'NINJA_positive_tumor', 'NINJA_negative_tumor', 'PDL1_positive_tumor', 'CC3_positive_tumor', 'MHCII_positive_tumor', 'MHCII_negative_tumor']

    - source: 'PD1_positive_CD8'
      targets: ['Tumor', 'pERK_positive_tumor', 'pERK_negative_tumor', 
                'NINJA_positive_tumor', 'NINJA_negative_tumor', 'PDL1_positive_tumor', 'CC3_positive_tumor', 'MHCII_positive_tumor', 'MHCII_negative_tumor']

    - source: 'CD4_Tregs'
      targets: ['Tumor', 'pERK_positive_tumor', 'pERK_negative_tumor', 
                'NINJA_positive_tumor', 'NINJA_negative_tumor', 'PDL1_positive_tumor', 'CC3_positive_tumor', 'MHCII_positive_tumor', 'MHCII_negative_tumor']

    - source: 'MHCII+_macrophages'
      targets: ['Tumor', 'pERK_positive_tumor', 'pERK_negative_tumor', 
                'NINJA_positive_tumor', 'NINJA_negative_tumor', 'PDL1_positive_tumor', 'CC3_positive_tumor', 'MHCII_positive_tumor', 'MHCII_negative_tumor']

    - source: 'MHCII-_macrophages'
      targets: ['Tumor', 'pERK_positive_tumor', 'pERK_negative_tumor', 
                'NINJA_positive_tumor', 'NINJA_negative_tumor', 'PDL1_positive_tumor', 'CC3_positive_tumor', 'MHCII_positive_tumor', 'MHCII_negative_tumor']

  metrics:
    - 'mean_nearest_neighbor'
    - 'median_nearest_neighbor'
    - 'min_distance'
    - 'distance_distribution'

  levels:
    - 'per_sample'
    - 'per_structure'

  comparisons:
    - name: 'Group_comparison'
      groups: ['KPT', 'KPNT', 'cis', 'trans']

  max_distance_plot: 500

# ============================================================================
# ANALYSIS 3: IMMUNE INFILTRATION
# ============================================================================
immune_infiltration:
  enabled: true
  use_spatialcells: true 
  use_optimized: true
  
  immune_populations:
    - CD45_positive
    - T_cells
    - CD4_T_cells
    - CD8_T_cells
    - CD4_Tregs
    - PD1_positive_CD8
    - B_cells
    - Macrophages
    - MHCII+_macrophages
    - MHCII-_macrophages

  boundaries:
    - 0
    - 50
    - 100
    - 150

  per_structure: true

  comparisons:
    - name: 'Group_comparison'
      groups: ['KPT', 'KPNT', 'cis', 'trans']

  immune_community_detection:
    enabled: true
    eps: 130                    # Larger eps for immune region detection
    min_samples: 20
    alpha: 130
    min_area: 30000             # Minimum area for immune regions (μm²)

  marker_zone_analysis:
    enabled: true
    
    markers:
      - marker: 'PERK'
        positive_phenotype: 'pERK_positive_tumor'
        negative_phenotype: 'pERK_negative_tumor'
      
      - marker: 'NINJA'
        positive_phenotype: 'NINJA_positive_tumor'
        negative_phenotype: 'NINJA_negative_tumor'
      
      - marker: 'PDL1'
        positive_phenotype: 'PDL1_positive_tumor'
        negative_phenotype: 'PDL1_negative_tumor'
      
      - marker: 'EPCAM'
        positive_phenotype: 'EPCAM_positive_tumor'
        negative_phenotype: 'EPCAM_negative_tumor'
      
      - marker: 'TTF1'
        positive_phenotype: 'TTF1_positive_tumor'
        negative_phenotype: 'TTF1_negative_tumor'

      - marker: 'CC3'
        positive_phenotype: 'CC3_positive_tumor'
        negative_phenotype: 'CC3_negative_tumor'

      - marker: 'MHCII'
        positive_phenotype: 'MHCII_positive_tumor'
        negative_phenotype: 'MHCII_negative_tumor'

    heterogeneity_metrics:
      - 'getis_ord_gi_star'
      - 'ripleys_k'
      - 'cluster_analysis'

    zone_infiltration:
      enabled: true
      immune_populations:
        - CD8_T_cells
        - PD1_positive_CD8
        - CD4_Tregs
        - T_cells
        - CD45_positive
        - Macrophages
        - MHCII+_macrophages
        - MHCII-_macrophages
        - B_cells

# ============================================================================
# ANALYSIS 4B: SPATIAL PERMUTATION TESTING
# ============================================================================
# Monte Carlo permutation testing to determine if spatial patterns are
# biologically meaningful or artifacts of random chance.
#
# KEY CONCEPT: Tests run WITHIN each tumor structure (e.g., B cell cluster).
# Question: "Are pERK+ cells clustered within this tumor?"
# NOT: "Is this pERK+ region statistically significant?"
spatial_permutation:
  enabled: true
  generate_plots: true

  # CRITICAL: Specify the column containing tumor structure IDs
  # This should match the output from per_structure_analysis
  # Typical values: 'tumor_structure_id', 'B_cells_structure_id', 'cluster_id'
  structure_column: tumor_region_id #tumor_structure_id

  # Test configurations
  # Available test types: clustering, colocalization, enrichment
  tests:
    # Single marker clustering - Are marker+ cells spatially clustered?
    - type: clustering
      name: pERK_clustering
      marker: is_pERK_positive_tumor

    - type: clustering
      name: NINJA_clustering
      marker: is_NINJA_positive_tumor
      tumor_marker: is_Tumor
    
    - type: clustering
      name: MHCII_clustering
      marker: is_MHCII_positive_tumor
      tumor_marker: is_Tumor

    # Two-marker co-localization - Do markers overlap more than chance?
    - type: colocalization
      name: pERK_NINJA_overlap
      marker1: is_pERK_positive_tumor
      marker2: is_NINJA_positive_tumor
      tumor_marker: is_Tumor
      radius: 30  # Distance threshold for cross-K function

    - type: colocalization
      name: pERK_MHCII_overlap
      marker1: is_pERK_positive_tumor
      marker2: is_MHCII_positive_tumor
      tumor_marker: is_Tumor
      radius: 30  # Distance threshold for cross-K function

    - type: colocalization  
      name: pERK-_NINJA_overlap
      marker1: is_pERK_negative_tumor
      marker2: is_NINJA_positive_tumor
      tumor_marker: is_Tumor
      radius: 30  # Distance threshold for cross-K function

    - type: colocalization
      name: NINJA_MHCII_overlap
      marker1: is_NINJA_positive_tumor
      marker2: is_MHCII_positive_tumor
      tumor_marker: is_Tumor
      radius: 30  # Distance threshold for cross-K function

    # Immune-marker enrichment - Are immune cells enriched near marker+ B cells?
    - type: enrichment
      name: CD8_near_NINJA
      tumor_marker: is_NINJA_positive_tumor
      immune_phenotype: is_CD8_T_cells
      radius: 50
    
    - type: enrichment
      name: PD1CD8_near_NINJA
      tumor_marker: is_NINJA_positive_tumor
      immune_phenotype: is_PD1_positive_CD8
      radius: 50

    - type: enrichment
      name: PD1CD8_near_pERK
      tumor_marker: is_pERK_positive_tumor
      immune_phenotype: is_PD1_positive_CD8
      radius: 50
    
    - type: enrichment
      name: CD8_near_pERK
      tumor_marker: is_pERK_positive_tumor
      immune_phenotype: is_CD8_T_cells
      radius: 50
    
    - type: enrichment
      name: CD8_near_MHCII
      tumor_marker: is_MHCII_positive_tumor
      immune_phenotype: is_CD8_T_cells
      radius: 50

    - type: enrichment
      name: PD1CD8_near_MHCII
      tumor_marker: is_MHCII_positive_tumor
      immune_phenotype: is_PD1_positive_CD8
      radius: 50
    
    - type: enrichment
      name: CD8_near_pERK-
      tumor_marker: is_pERK_negative_tumor
      immune_phenotype: is_CD8_T_cells
      radius: 50
    
    - type: enrichment
      name: PD1CD8_near_pERK-
      tumor_marker: is_pERK_negative_tumor
      immune_phenotype: is_PD1_positive_CD8
      radius: 50
    
  # Statistical parameters
  parameters:
    n_permutations: 500        # Number of Monte Carlo permutations
    min_tumor_cells: 500        # Minimum cells per tumor for testing
    alpha: 0.05                # Significance threshold
    min_prevalence: 0.05       # Minimum marker prevalence (5%)
    max_prevalence: 0.95       # Maximum marker prevalence (95%)
    enrichment_radius: 50      # Default radius for enrichment tests (um)
    clustering_radius: 30      # Default radius for clustering metrics (um)
    max_structures: 500        # Safety limit - fail if more structures than this
    colocalization_radius: 30  # Default radius for co-localization (um)

  # Grouping for cross-sample comparisons
  grouping:
    split_by:
      - group
      - timepoint
    aggregate: true  # Aggregate results across tumors within samples


# ============================================================================
# ANALYSIS 4C: DISTANCE PERMUTATION TESTING
# ============================================================================
# Permutation testing to determine if observed distance differences between
# cell populations are statistically significant.
#
# Differential tests: Are source cells closer to marker+ vs marker- targets?
# Proximity tests: Are source cells specifically close to a target population?
distance_permutation_testing:
  enabled: true
  generate_plots: true

  # Differential tests: is source immune pop closer to marker+ vs marker- tumor?
  # Mirrors the distance_analysis pairings
  differential_tests:
    # CD8 T cells
    - name: CD8_to_pERK_vs_nonpERK
      source: CD8_T_cells
      target_base: Tumor
      target_marker: is_pERK_positive_tumor
    - name: CD8_to_NINJA_vs_nonNINJA
      source: CD8_T_cells
      target_base: Tumor
      target_marker: is_NINJA_positive_tumor
    - name: CD8_to_MHCII_vs_nonMHCII_tumor
      source: CD8_T_cells
      target_base: Tumor
      target_marker: is_MHCII_positive_tumor

    # PD1+ CD8 T cells
    - name: PD1CD8_to_pERK_vs_nonpERK
      source: PD1_positive_CD8
      target_base: Tumor
      target_marker: is_pERK_positive_tumor
    - name: PD1CD8_to_NINJA_vs_nonNINJA
      source: PD1_positive_CD8
      target_base: Tumor
      target_marker: is_NINJA_positive_tumor

    # CD4 Tregs
    - name: Tregs_to_pERK_vs_nonpERK
      source: CD4_Tregs
      target_base: Tumor
      target_marker: is_pERK_positive_tumor
    - name: Tregs_to_NINJA_vs_nonNINJA
      source: CD4_Tregs
      target_base: Tumor
      target_marker: is_NINJA_positive_tumor

    # MHCII+ macrophages
    - name: MHCIIpos_mac_to_pERK_vs_nonpERK
      source: MHCII+_macrophages
      target_base: Tumor
      target_marker: is_pERK_positive_tumor
    - name: MHCIIpos_mac_to_NINJA_vs_nonNINJA
      source: MHCII+_macrophages
      target_base: Tumor
      target_marker: is_NINJA_positive_tumor

    # MHCII- macrophages
    - name: MHCIIneg_mac_to_pERK_vs_nonpERK
      source: MHCII-_macrophages
      target_base: Tumor
      target_marker: is_pERK_positive_tumor
    - name: MHCIIneg_mac_to_NINJA_vs_nonNINJA
      source: MHCII-_macrophages
      target_base: Tumor
      target_marker: is_NINJA_positive_tumor

  proximity_tests:
    - name: CD8_proximity_to_tumor
      source: CD8_T_cells
      target: Tumor
      shuffle_pool: [CD8_T_cells, CD4_T_cells, Macrophages, B_cells]
    - name: Tregs_proximity_to_tumor
      source: CD4_Tregs
      target: Tumor
      shuffle_pool: [CD8_T_cells, CD4_T_cells, CD4_Tregs, Macrophages, B_cells]

  parameters:
    n_permutations: 999
    min_cells: 10
    alpha: 0.05

# ============================================================================
# ANALYSIS 4D: NEIGHBORHOOD ENRICHMENT PERMUTATION TESTING
# ============================================================================
# Permutation testing for spatial neighborhood enrichment between cell types.
# Following squidpy gr.nhood_enrichment approach: build k-NN graph, count
# interactions between cell-type pairs, permute labels to build null.
neighborhood_permutation_testing:
  enabled: true
  generate_plots: true

  cell_types:
    - Tumor
    - pERK_positive_tumor
    - pERK_negative_tumor
    - NINJA_positive_tumor
    - NINJA_negative_tumor
    - PDL1_positive_tumor
    - CC3_positive_tumor
    - MHCII_positive_tumor
    - MHCII_negative_tumor
    - CD8_T_cells
    - PD1_positive_CD8
    - CD4_T_cells
    - CD4_Tregs
    - Macrophages
    - MHCII+_macrophages
    - MHCII-_macrophages
    - B_cells

  # Differential enrichment: is immune pop X more enriched around marker+ vs
  # marker- tumor cells? Shuffles marker labels among tumor cells.
  differential_enrichment_tests:
    # All immune pops vs pERK+/-
    - name: CD8_enrichment_pERK_vs_nonpERK
      immune_population: CD8_T_cells
      tumor_base: Tumor
      tumor_marker: is_pERK_positive_tumor
    - name: PD1CD8_enrichment_pERK_vs_nonpERK
      immune_population: PD1_positive_CD8
      tumor_base: Tumor
      tumor_marker: is_pERK_positive_tumor
    - name: Tregs_enrichment_pERK_vs_nonpERK
      immune_population: CD4_Tregs
      tumor_base: Tumor
      tumor_marker: is_pERK_positive_tumor
    - name: MHCIIpos_mac_enrichment_pERK_vs_nonpERK
      immune_population: MHCII+_macrophages
      tumor_base: Tumor
      tumor_marker: is_pERK_positive_tumor
    - name: MHCIIneg_mac_enrichment_pERK_vs_nonpERK
      immune_population: MHCII-_macrophages
      tumor_base: Tumor
      tumor_marker: is_pERK_positive_tumor
    - name: B_cells_enrichment_pERK_vs_nonpERK
      immune_population: B_cells
      tumor_base: Tumor
      tumor_marker: is_pERK_positive_tumor

    # All immune pops vs NINJA+/-
    - name: CD8_enrichment_NINJA_vs_nonNINJA
      immune_population: CD8_T_cells
      tumor_base: Tumor
      tumor_marker: is_NINJA_positive_tumor
    - name: PD1CD8_enrichment_NINJA_vs_nonNINJA
      immune_population: PD1_positive_CD8
      tumor_base: Tumor
      tumor_marker: is_NINJA_positive_tumor
    - name: Tregs_enrichment_NINJA_vs_nonNINJA
      immune_population: CD4_Tregs
      tumor_base: Tumor
      tumor_marker: is_NINJA_positive_tumor
    - name: MHCIIpos_mac_enrichment_NINJA_vs_nonNINJA
      immune_population: MHCII+_macrophages
      tumor_base: Tumor
      tumor_marker: is_NINJA_positive_tumor
    - name: MHCIIneg_mac_enrichment_NINJA_vs_nonNINJA
      immune_population: MHCII-_macrophages
      tumor_base: Tumor
      tumor_marker: is_NINJA_positive_tumor
    - name: B_cells_enrichment_NINJA_vs_nonNINJA
      immune_population: B_cells
      tumor_base: Tumor
      tumor_marker: is_NINJA_positive_tumor

  parameters:
    n_permutations: 1000
    k_neighbors: 30
    min_cells_per_type: 10
    alpha: 0.05

# ============================================================================
# ANALYSIS 4: CELLULAR NEIGHBORHOODS
# ============================================================================
cellular_neighborhoods:
  enabled: true
  use_optimized: true
  
  populations:
    # Tumor states
    - Tumor
    - pERK_positive_tumor
    - pERK_negative_tumor
    - NINJA_positive_tumor
    - NINJA_negative_tumor
    - Ki67_positive_tumor
    - PDL1_positive_tumor
    - EPCAM_positive_tumor
    - TTF1_positive_tumor
    - CC3_positive_tumor
    - MHCII_positive_tumor
    - MHCII_negative_tumor
    # Immune populations
    - CD45_positive
    - T_cells
    - CD4_T_cells
    - CD8_T_cells
    - CD4_Tregs
    - PD1_positive_CD8
    - B_cells
    - Macrophages
    - MHCII+_macrophages
    - MHCII-_macrophages

  window_size: 100
  k_neighbors: 30
  cells_per_sample: 100000
  n_clusters: 15
  clustering_method: 'kmeans'
  define_globally: true

  analyses:
    - 'composition'
    - 'infiltration'
    - 'spatial_distribution'

  comparisons:
    - name: 'Group_comparison'
      groups: ['KPT', 'KPNT', 'cis', 'trans']


marker_region_analysis:
  enabled: true
  generate_plots: true

  # Markers to analyze (use is_ prefix for column names)
  markers:
    - name: 'pERK'
      positive_col: 'is_pERK_positive_tumor'
      negative_col: 'is_pERK_negative_tumor'

    - name: 'NINJA'
      positive_col: 'is_NINJA_positive_tumor'
      negative_col: 'is_NINJA_negative_tumor'

    - name: 'PDL1'
      positive_col: 'is_PDL1_positive_tumor'
      negative_col: 'is_PDL1_negative_tumor'

    - name: 'EPCAM'
      positive_col: 'is_EPCAM_positive_tumor'
      negative_col: 'is_EPCAM_negative_tumor'

    - name: 'TTF1'
      positive_col: 'is_TTF1_positive_tumor'
      negative_col: 'is_TTF1_negative_tumor'

    - name: 'CC3'
      positive_col: 'is_CC3_positive_tumor'
      negative_col: 'is_CC3_negative_tumor'
    
    - name: 'MHCII'
      positive_col: 'is_MHCII_positive_tumor'
      negative_col: 'is_MHCII_negative_tumor'

  # Region detection parameters
  region_detection:
    eps: 55                    # DBSCAN epsilon (smaller = more outliers)
    min_samples: 5             # Minimum samples for DBSCAN
    alpha: 27                  # Alpha shape parameter (smaller = more detailed)
    core_only: true            # Use only core samples (more stringent)
    min_area: 0                # Minimum area for regions (μm²)
    min_edges: 20              # Minimum edges for boundary polygons
    holes_min_area: 10000      # Minimum area for holes (μm²)
    holes_min_edges: 10        # Minimum edges for holes

  # Phenotypes to analyze within regions
  phenotype_columns:
    - 'is_Tumor'
    - 'is_pERK_positive_tumor'
    - 'is_pERK_negative_tumor'
    - 'is_NINJA_positive_tumor'
    - 'is_NINJA_negative_tumor'
    - 'is_Ki67_positive_tumor'
    - 'is_PDL1_positive_tumor'
    - 'is_EPCAM_positive_tumor'
    - 'is_TTF1_positive_tumor'
    - 'is_pERK_NINJA_positive_tumor'
    - 'is_CC3_positive_tumor'
    - 'is_MHCII_positive_tumor'
    - 'is_MHCII_negative_tumor'
    - 'is_CD45_positive'
    - 'is_T_cells'
    - 'is_CD8_T_cells'
    - 'is_CD4_T_cells'
    - 'is_CD4_Tregs'
    - 'is_PD1_positive_CD8'
    - 'is_Macrophages'
    - 'is_MHCII+_macrophages'
    - 'is_MHCII-_macrophages'
    - 'is_B_cells'

  # Immune populations for enrichment analysis (use is_ prefix)
  immune_populations:
    - 'is_CD45_positive'
    - 'is_T_cells'
    - 'is_CD4_T_cells'
    - 'is_CD8_T_cells'
    - 'is_CD4_Tregs'
    - 'is_PD1_positive_CD8'
    - 'is_B_cells'
    - 'is_Macrophages'
    - 'is_MHCII+_macrophages'
    - 'is_MHCII-_macrophages'

  # Optional hole analysis
  analyze_holes: true
  hole_buffer_distance: 30   # Distance for inner/outer hole zones (μm)

# ============================================================================
# ANALYSIS 5: COEXPRESSION ANALYSIS
# ============================================================================
coexpression_analysis:
  enabled: true

  markers:
    pERK: 'is_PERK'
    NINJA: 'is_NINJA'
    Ki67: 'is_KI67'
    PDL1: 'is_PDL1'
    EPCAM: 'is_EPCAM'
