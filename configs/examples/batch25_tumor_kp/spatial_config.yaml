# ============================================================================
# ANALYSIS 9: PSEUDOTIME ANALYSIS (NEW)
# ============================================================================
pseudotime_analysis:
  enabled: true
  generate_plots: true

# ============================================================================
# ANALYSIS 10: MARKER CLUSTERING ANALYSIS WITH RANDOMIZATION TESTING
# ============================================================================
marker_clustering_analysis:
  enabled: true
  generate_plots: true

  # Number of random permutations to test against null model
  n_permutations: 500

  # Significance level for testing
  alpha: 0.05

  # Tumor markers to analyze for spatial clustering
  tumor_markers:
    - 'pERK'
    - 'NINJA'
    - 'Ki67'
    - 'PD-L1'
    - 'MHC-II'

# ============================================================================
# ANALYSIS 11: SPATIAL OVERLAP ANALYSIS (MARKER REGIONS)
# ============================================================================
spatial_overlap_analysis:
  enabled: true

  # Region detection parameters (SpatialCells)
  region_detection:
    eps: 50                    # DBSCAN epsilon for clustering
    min_samples: 10            # Minimum samples per cluster
    alpha: 50                  # Alpha shape parameter
    core_only: true            # Use only core samples
    min_area: 5000             # Minimum area for regions (μm²)
    min_edges: 15              # Minimum edges for boundary polygons

# ============================================================================
# ANALYSIS: pERK MFI ANALYSIS (NEW)
# ============================================================================
# Analyzes pERK mean fluorescence intensity (MFI) from raw/normalized layers.
# Tests whether pERK expression level correlates with proximity to CD8 T cells.
perk_mfi_analysis:
  enabled: true
  marker_name: 'PERK'         # var_name in adata.var_names
  tumor_phenotype: 'Tumor'    # restrict to tumor cells only
  tcell_populations:
    - CD8_T_cells
    - T_cells
  window_radius: 50           # µm radius for T cell density window
  distance_bins: [0, 25, 50, 100, 200, 500]  # µm bins for distance analysis

# ============================================================================
# VISUALIZATION SETTINGS
# ============================================================================
visualization:
  enabled: true
  style: 'publication'
  color_palette: 'colorblind_safe'
  font_family: 'Arial'
  font_size: 12
  individual_plots: true
  composite_plots: true
  publication:
    remove_spines: true
    grid: false
    tight_layout: true
    despine: true
  exploratory:
    show_points: true
    alpha: 0.6
    show_stats: true

# ============================================================================
# SPATIAL VISUALIZATION SETTINGS
# ============================================================================
spatial_visualization:
  enabled: true

  # Generate spatial plots for each individual phenotype
  individual_phenotypes: true

  # Generate tumor zone plots (DBSCAN cluster validation)
  tumor_zones: true

  # Generate marker +/- zone plots (e.g., pERK+/- spatial zones)
  marker_zones: true

  # Generate tumor structure plots per sample
  tumor_structures: true

  # Generate multi-phenotype overlay plots
  phenotype_overlays: true

  # Distance histogram settings
  distance_histograms:
    enabled: true
    distance_bins: [0, 50, 100, 200, 300, 500]  # Distance bands in microns

# ============================================================================
# STATISTICAL TESTING
# ============================================================================
statistics:
  enabled: true
  pairwise_test: 'mannwhitneyu'
  correlation_test: 'spearman'
  fdr_correction: 'benjamini_hochberg'
  alpha: 0.05
  report_effect_sizes: true
  effect_size_methods:
    - 'cohens_d'
    - 'rank_biserial'
  confidence_intervals: true
  ci_level: 0.95
  n_bootstrap: 10000
  save_all_tests: true

# ============================================================================
# KPNT CORRELATION ANALYSIS
# ============================================================================
kpnt_correlation_analysis:
  enabled: true
  # Analyzes correlations for KPNT samples only:
  # 1. Tumor size vs marker positivity
  # 2. Infiltration vs marker positivity
  # Creates box plots with statistical and non-statistical versions

# ============================================================================
# PERFORMANCE
# ============================================================================
performance:
  n_jobs: -1
  parallel_processing: true
  chunk_size: 10000
  use_kdtree: true
  memory_efficient: true

# ============================================================================
# ADVANCED OPTIONS
# ============================================================================
advanced:
  random_seed: 42
  verbose: true
  log_file: 'spatial_quantification.log'
  checkpointing:
    enabled: true
    frequency: 'per_analysis'
    directory: 'checkpoints'
