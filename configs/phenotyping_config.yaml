# Phenotyping Configuration
# Define cell type gates and thresholding settings for manual_gating.py

thresholding:
  primary_method: "visual_gating"
  validation_methods: ["otsu", "gmm"]
  consensus_threshold: 0.7

# Global intensity thresholds (set to null for auto-calculation)
global_thresholds:
  DAPI: null
  STRUCTURE_MARKER: null     # primary structure marker
  IMMUNE_MARKER: null        # pan-immune marker
  T_CELL_MARKER: null        # T cell marker
  # add additional markers as needed

# Per-sample overrides (uncomment and fill in as needed)
slide_specific_overrides: {}
  # SAMPLE1:
  #   STRUCTURE_MARKER: 150.0

# Phenotype definitions
phenotype_rules:
  primary_structure:
    positive: ["STRUCTURE_MARKER"]
    negative: []
    description: "Primary structure cells"

  all_immune:
    positive: ["IMMUNE_MARKER"]
    negative: []
    description: "All immune cells"

  t_cells:
    positive: ["T_CELL_MARKER"]
    negative: []
    description: "All T cells"

validation:
  min_positive_cells: 10
  max_threshold_cv: 0.3
  plot_distributions: true
