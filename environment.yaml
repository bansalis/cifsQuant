# cifsQuant Python Environment
# ============================================================================
# Creates a conda environment with all dependencies for Stages 2 and 3.
# Stage 1 (Nextflow segmentation) uses Docker containers — see nextflow.config.
#
# Install:
#   conda env create -f environment.yaml
#   conda activate cifsquant
#
# Update an existing install:
#   conda env update -f environment.yaml --prune
# ============================================================================

name: cifsquant

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10

  # ── Core scientific stack ──────────────────────────────────────────────────
  - numpy=1.26.*          # Pin to <2.0 for numba/torch compatibility
  - pandas>=2.0
  - scipy>=1.12
  - matplotlib>=3.8
  - seaborn>=0.13
  - scikit-learn>=1.3
  - scikit-image>=0.21
  - statsmodels>=0.14
  - joblib>=1.3
  - tifffile>=2023.1
  - pyyaml>=6.0
  - networkx>=3.3

  # ── Single-cell analysis ───────────────────────────────────────────────────
  - anndata>=0.10
  - scanpy>=1.9
  - umap-learn>=0.5
  - numba>=0.58         # Required by umap-learn

  # ── Spatial / graph analysis ───────────────────────────────────────────────
  - shapely>=2.0
  - igraph>=0.11        # Fast graph operations
  - leidenalg>=0.10     # Leiden clustering (neighborhoods)

  # ── GPU acceleration (optional — comment out if no NVIDIA GPU) ─────────────
  # Uncomment ONE of the following to match your installed CUDA version:
  # - cupy-cuda11x      # CUDA 11.x
  # - cupy-cuda12x      # CUDA 12.x

  # ── pip-only packages ──────────────────────────────────────────────────────
  - pip
  - pip:
    # SCIMAP: spatial single-cell analysis
    - scimap>=2.3

    # SpatialCells: structure boundary detection (alpha shapes, region assignment)
    # ⚠  This package is NOT on PyPI. Install from source — see setup_environment.sh.
    # - spatialcells>=1.0   # uncomment if installing separately
