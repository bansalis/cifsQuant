# ============================================================================
# SPATIAL QUANTIFICATION CONFIGURATION - SINGLE TIMEPOINT COMPREHENSIVE
# ============================================================================
# Updated: 2025-11-09
# Single timepoint with extensive marker panel (23 markers)

# ============================================================================
# INPUT/OUTPUT
# ============================================================================
input:
  gated_data: 'manual_gating_output/gated_data.h5ad'
  metadata: 'sample_metadata.csv'

output:
  base_directory: 'spatial_quantification_results'
  save_intermediate: true
  formats: ['pdf', 'png']
  dpi: 300

# ============================================================================
# PLOT CUSTOMIZATION
# ============================================================================
plotting:
  font_family: 'DejaVu Sans'
  font_size: 11
  title_size: 14
  show_stats: true
  stat_method: 'mann_whitney'
  fdr_correction: true
  significance_symbols:
    0.001: '***'
    0.01: '**'
    0.05: '*'
    1.0: 'ns'
  group_colors:
    KPT: '#E41A1C'
    KPNT: '#377EB8'
    cis: '#4DAF4A'
    trans: '#FF7F00'

# ============================================================================
# TUMOR DEFINITION
# ============================================================================
tumor_definition:
  base_phenotype: 'Tumor'
  required_positive: ['TOM']
  required_negative: []
  structure_detection:
    method: 'DBSCAN'
    eps: 800
    min_samples: 250
    min_cluster_size: 250
    boundary_buffer: 100
    use_expanded_boundary: true

# ============================================================================
# METADATA CONFIGURATION
# ============================================================================
metadata:
  sample_column: 'sample_id'
  group_column: 'group'
  timepoint_column: 'timepoint'
  additional_groupings:
    - 'genotype'
    - 'main_group'
    - 'treatment'

# ============================================================================
# PHENOTYPE DEFINITIONS
# ============================================================================
phenotypes:
  # ============================================================================
  # TUMOR PHENOTYPES
  # ============================================================================
  Tumor:
    description: "All tumor cells (TOM+)"
    positive: ['TOM']
    negative: []
  
  pERK_positive_tumor:
    description: "pERK+ tumor cells"
    base: 'Tumor'
    positive: ['PERK']
  
  pERK_negative_tumor:
    description: "pERK- tumor cells"
    base: 'Tumor'
    negative: ['PERK']
  
  NINJA_positive_tumor:
    description: "NINJA+ (AGFP+) tumor"
    base: 'Tumor'
    positive: ['NINJA']
  
  NINJA_negative_tumor:
    description: "NINJA- tumor"
    base: 'Tumor'
    negative: ['NINJA']
  
  Ki67_positive_tumor:
    description: "Proliferating tumor"
    base: 'Tumor'
    positive: ['KI67']
  
  PDL1_positive_tumor:
    description: "PD-L1+ tumor (checkpoint)"
    base: 'Tumor'
    positive: ['PDL1']
  
  PDL1_negative_tumor:
    description: "PD-L1- tumor"
    base: 'Tumor'
    negative: ['PDL1']
  
  EPCAM_positive_tumor:
    description: "Epithelial tumor"
    base: 'Tumor'
    positive: ['EPCAM']
    
  EPCAM_negative_tumor:
    description: "Epithelial tumor"
    base: 'Tumor'
    negative: ['EPCAM']
  
  TTF1_positive_tumor:
    description: "TTF1+ lung lineage"
    base: 'Tumor'
    positive: ['TTF1']
  
  TTF1_negative_tumor:
    description: "TTF1- lung lineage"
    base: 'Tumor'
    negative: ['TTF1']

  CC3_positive_tumor:
    description: "Apoptotic tumor"
    base: 'Tumor'
    positive: ['CC3']
  
  CC3_negative_tumor:
    description: "Non-apoptotic tumor"
    base: 'Tumor'
    negative: ['CC3']
  
  pERK_NINJA_positive_tumor:
    description: "Double positive"
    base: 'Tumor'
    positive: ['PERK', 'NINJA']
  
  # ============================================================================
  # T CELLS
  # ============================================================================
  CD45_positive:
    description: "All immune cells"
    positive: ['CD45']
    negative: []
  
  T_cells:
    description: "All T cells"
    positive: ['CD3E']
    negative: []
  
  CD8_T_cells:
    description: "CD8+ cytotoxic T cells"
    positive: ['CD3E', 'CD8A']
    negative: []
  
  CD4_T_cells:
    description: "CD4+ helper T cells"
    positive: ['CD3E', 'CD4']
    negative: []
  
  CD4_Tregs:
    description: "CD4+ regulatory T cells"
    positive: ['CD3E', 'CD4', 'FOXP3']
    negative: []
  
  CD8_TRM:
    description: "CD8+ tissue resident memory"
    positive: ['CD3E', 'CD8A', 'CD103']
    negative: []
  
  CD8_cytotoxic:
    description: "Cytotoxic CD8+ (GZMB+)"
    positive: ['CD3E', 'CD8A', 'GZMB']
    negative: []
  
  CD8_TRM_cytotoxic:
    description: "Cytotoxic tissue resident CD8+"
    positive: ['CD3E', 'CD8A', 'CD103', 'GZMB']
    negative: []
  
  PD1_positive_CD8:
    description: "Exhausted CD8+ T cells"
    positive: ['CD3E', 'CD8A', 'PD1']
    negative: []
  
  KLRG1_positive_CD8:
    description: "Terminal effector CD8+"
    positive: ['CD3E', 'CD8A', 'KLRG1']
    negative: []
  
  CD8_proliferating:
    description: "Proliferating CD8+"
    positive: ['CD3E', 'CD8A', 'KI67']
    negative: []
  
  # ============================================================================
  # MACROPHAGES
  # ============================================================================
  Macrophages:
    description: "All macrophages"
    positive: ['F480']
    negative: []
  
  M1_macrophages:
    description: "M1 anti-tumor macrophages"
    positive: ['F480', 'MHCII']
    negative: []
  
  M2_macrophages:
    description: "M2 pro-tumor macrophages"
    positive: ['F480']
    negative: ['MHCII']
  
  # ============================================================================
  # OTHER IMMUNE
  # ============================================================================
  B_cells:
    description: "B cells"
    positive: ['B220']
    negative: []
  
  Germinal_center_B_cells:
    description: "Germinal center B cells"
    positive: ['B220', 'BCL6']
    negative: []
  
  # ============================================================================
  # STROMAL
  # ============================================================================
  CAFs:
    description: "Cancer-associated fibroblasts"
    positive: ['ASMA']
    negative: ['CD45']

# ============================================================================
# ANALYSIS 0: PER-TUMOR ANALYSIS
# ============================================================================
per_tumor_analysis:
  enabled: true
  generate_plots: true

  markers:
    - name: 'pERK'
      phenotype: 'pERK_positive_tumor'
    - name: 'NINJA'
      phenotype: 'NINJA_positive_tumor'
    - name: 'Ki67'
      phenotype: 'Ki67_positive_tumor'
    - name: 'EPCAM'
      phenotype: 'EPCAM_positive_tumor'
    - name: 'TTF1'
      phenotype: 'TTF1_positive_tumor'
    - name: 'PD-L1'
      phenotype: 'PD_positive_tumor'
    - name: 'CC3'
      phenotype: 'CC3_positive_tumor'

# ============================================================================
# ANALYSIS 1: POPULATION DYNAMICS (CROSS-SECTIONAL)
# ============================================================================
population_dynamics:
  populations:
    # Tumor (10)
    - Tumor
    - pERK_positive_tumor
    - pERK_negative_tumor
    - NINJA_positive_tumor
    - NINJA_negative_tumor
    - Ki67_positive_tumor
    - PDL1_positive_tumor
    - EPCAM_positive_tumor
    - TTF1_positive_tumor
    - pERK_NINJA_positive_tumor
    
    # T cells (9)
    - CD45_positive
    - T_cells
    - CD8_T_cells
    - CD4_T_cells
    - CD4_Tregs
    - CD8_TRM
    - CD8_cytotoxic
    - CD8_TRM_cytotoxic
    - PD1_positive_CD8
    - KLRG1_positive_CD8
    - CD8_proliferating
    
    # Myeloid (3)
    - Macrophages
    - M1_macrophages
    - M2_macrophages
    
    # Other (3)
    - B_cells
    - Germinal_center_B_cells
    - CAFs
  
  fractional_populations:
    pERK_positive_tumor: Tumor
    NINJA_positive_tumor: Tumor
    Ki67_positive_tumor: Tumor
    PDL1_positive_tumor: Tumor
    EPCAM_positive_tumor: Tumor
    TTF1_positive_tumor: Tumor
    CD8_T_cells: T_cells
    CD4_T_cells: T_cells
    CD4_Tregs: CD4_T_cells
    CD8_TRM: CD8_T_cells
    CD8_cytotoxic: CD8_T_cells
    CD8_TRM_cytotoxic: CD8_T_cells
    PD1_positive_CD8: CD8_T_cells
    KLRG1_positive_CD8: CD8_T_cells
    M1_macrophages: Macrophages
    M2_macrophages: Macrophages
    Germinal_center_B_cells: B_cells

  comparisons:
    - name: 'Group_comparison'
      groups: ['KPT', 'KPNT', 'cis', 'trans']  # Adjust based on actual groups

  metrics:
    - 'count'
    - 'density'
    - 'fraction'

  statistics:
    test_per_timepoint: false  # Single timepoint
    test_method: 'mannwhitneyu'
    alpha: 0.05
    fdr_correction: 'benjamini_hochberg'

# ============================================================================
# ANALYSIS 2: CELL-TO-CELL DISTANCE ANALYSIS
# ============================================================================
distance_analysis:
  enabled: true
  
  pairings:
    - source: 'CD8_T_cells'
      targets: ['Tumor', 'pERK_positive_tumor', 'pERK_negative_tumor', 
                'NINJA_positive_tumor', 'NINJA_negative_tumor', 'PDL1_positive_tumor']
    
    - source: 'CD8_cytotoxic'
      targets: ['pERK_positive_tumor', 'NINJA_positive_tumor', 'Ki67_positive_tumor']
    
    - source: 'CD8_TRM_cytotoxic'
      targets: ['pERK_positive_tumor', 'NINJA_positive_tumor']
    
    - source: 'PD1_positive_CD8'
      targets: ['PDL1_positive_tumor']
    
    - source: 'CD4_Tregs'
      targets: ['CD8_T_cells', 'CD8_cytotoxic', 'Tumor']
    
    - source: 'M1_macrophages'
      targets: ['Tumor', 'pERK_positive_tumor']
    
    - source: 'M2_macrophages'
      targets: ['Tumor', 'pERK_positive_tumor']
    
    - source: 'CAFs'
      targets: ['CD8_T_cells', 'Tumor']

  metrics:
    - 'mean_nearest_neighbor'
    - 'median_nearest_neighbor'
    - 'min_distance'
    - 'distance_distribution'

  levels:
    - 'per_sample'
    - 'per_structure'

  comparisons:
    - name: 'Group_comparison'
      groups: ['KPT', 'KPNT', 'cis', 'trans']

  max_distance_plot: 500

# ============================================================================
# ANALYSIS 3: IMMUNE INFILTRATION
# ============================================================================
immune_infiltration:
  enabled: true
  use_optimized: true
  
  immune_populations:
    - CD45_positive
    - T_cells
    - CD4_T_cells
    - CD8_T_cells
    - CD4_Tregs
    - CD8_TRM
    - CD8_cytotoxic
    - CD8_TRM_cytotoxic
    - PD1_positive_CD8
    - KLRG1_positive_CD8
    - CD8_proliferating
    - B_cells
    - Germinal_center_B_cells
    - Macrophages
    - M1_macrophages
    - M2_macrophages
    - CAFs

  boundaries:
    - 0
    - 50
    - 100
    - 200
    - 500

  per_structure: true

  comparisons:
    - name: 'Group_comparison'
      groups: ['KPT', 'KPNT', 'cis', 'trans']

  marker_zone_analysis:
    enabled: true
    
    markers:
      - marker: 'PERK'
        positive_phenotype: 'pERK_positive_tumor'
        negative_phenotype: 'pERK_negative_tumor'
      
      - marker: 'NINJA'
        positive_phenotype: 'NINJA_positive_tumor'
        negative_phenotype: 'NINJA_negative_tumor'
      
      - marker: 'PDL1'
        positive_phenotype: 'PDL1_positive_tumor'
        negative_phenotype: 'PDL1_negative_tumor'
      
      - marker: 'EPCAM'
        positive_phenotype: 'EPCAM_positive_tumor'
        negative_phenotype: 'EPCAM_negative_tumor'
      
      - marker: 'TTF1'
        positive_phenotype: 'TTF1_positive_tumor'
        negative_phenotype: 'TTF1_negative_tumor'

      - marker: 'CC3'
        positive_phenotype: 'CC3_positive_tumor'
        negative_phenotype: 'CC3_negative_tumor'

    heterogeneity_metrics:
      - 'getis_ord_gi_star'
      - 'ripleys_k'
      - 'cluster_analysis'

    zone_infiltration:
      enabled: true
      immune_populations:
        - CD8_T_cells
        - CD8_cytotoxic
        - CD8_TRM
        - CD8_TRM_cytotoxic
        - PD1_positive_CD8
        - KLRG1_positive_CD8
        - CD4_Tregs
        - T_cells
        - CD45_positive
        - Macrophages
        - M1_macrophages
        - M2_macrophages
        - B_cells

# ============================================================================
# ANALYSIS 4: CELLULAR NEIGHBORHOODS
# ============================================================================
cellular_neighborhoods:
  enabled: true
  use_optimized: true
  
  populations:
    # Tumor states
    - Tumor
    - pERK_positive_tumor
    - pERK_negative_tumor
    - NINJA_positive_tumor
    - NINJA_negative_tumor
    - Ki67_positive_tumor
    - PDL1_positive_tumor
    - EPCAM_positive_tumor
    - TTF1_positive_tumor
    - CC3_positive_tumor
    # Immune populations
    - CD45_positive
    - T_cells
    - CD4_T_cells
    - CD8_T_cells
    - CD4_Tregs
    - CD8_TRM
    - CD8_cytotoxic
    - CD8_TRM_cytotoxic
    - PD1_positive_CD8
    - KLRG1_positive_CD8
    - CD8_proliferating
    - B_cells
    - Germinal_center_B_cells
    - Macrophages
    - M1_macrophages
    - M2_macrophages
    - CAFs

  window_size: 100
  k_neighbors: 30
  cells_per_sample: 100000
  n_clusters: 15
  clustering_method: 'kmeans'
  define_globally: true

  analyses:
    - 'composition'
    - 'infiltration'
    - 'spatial_distribution'

  comparisons:
    - name: 'Group_comparison'
      groups: ['KPT', 'KPNT', 'cis', 'trans']

# ============================================================================
# ANALYSIS 5: COEXPRESSION ANALYSIS
# ============================================================================
coexpression_analysis:
  enabled: true

  markers:
    pERK: 'is_PERK'
    NINJA: 'is_NINJA'
    Ki67: 'is_KI67'
    PDL1: 'is_PDL1'
    EPCAM: 'is_EPCAM'
    TTF1: 'is_TTF1'
    CC3: 'is_CC3'

# ============================================================================
# ANALYSIS 6: ENHANCED NEIGHBORHOODS
# ============================================================================
enhanced_neighborhoods:
  enabled: true

  neighborhood_radius: 50

  markers:
    - name: 'pERK'
      pos_col: 'is_pERK_positive_tumor'
      neg_col: 'is_pERK_negative_tumor'
    
    - name: 'NINJA'
      pos_col: 'is_NINJA_positive_tumor'
      neg_col: 'is_NINJA_negative_tumor'
    
    - name: 'PDL1'
      pos_col: 'is_PDL1_positive_tumor'
      neg_col: 'is_PDL1_negative_tumor'
    
    - name: 'EPCAM'
      pos_col: 'is_EPCAM_positive_tumor'
      neg_col: 'is_EPCAM_negative_tumor'
    
    - name: 'TTF1'
      pos_col: 'is_TTF1_positive_tumor'
      neg_col: 'is_TTF1_negative_tumor'

  cell_types:
    - Tumor
    - pERK_positive_tumor
    - NINJA_positive_tumor
    - Ki67_positive_tumor
    - PDL1_positive_tumor
    - EPCAM_positive_tumor
    - TTF1_positive_tumor
    - CD45_positive
    - T_cells
    - CD4_T_cells
    - CD8_T_cells
    - CD8_TRM
    - CD8_cytotoxic
    - CD8_TRM_cytotoxic
    - PD1_positive_CD8
    - KLRG1_positive_CD8
    - CD4_Tregs
    - Macrophages
    - M1_macrophages
    - M2_macrophages
    - B_cells
    - CAFs

  immune_cells:
      - CD45_positive
      - T_cells
      - CD4_T_cells
      - CD8_T_cells
      - CD8_TRM
      - CD8_cytotoxic
      - CD8_TRM_cytotoxic
      - PD1_positive_CD8
      - KLRG1_positive_CD8
      - CD4_Tregs
      - Macrophages
      - M1_macrophages
      - M2_macrophages
      - B_cells
      - CAFs

# ============================================================================
# ANALYSIS 7: TUMOR MICROENVIRONMENT
# ============================================================================
tumor_microenvironment:
  enabled: true
  generate_plots: true

  distance_bins:
    contact: 20
    close: 100
    distal: 500

  tumor_phenotypes:
    - name: 'pERK'
      phenotype: 'pERK_positive_tumor'
    - name: 'NINJA'
      phenotype: 'NINJA_positive_tumor'
    - name: 'Ki67'
      phenotype: 'Ki67_positive_tumor'
    - name: 'EPCAM'
      phenotype: 'EPCAM_positive_tumor'
    - name: 'TTF1'
      phenotype: 'TTF1_positive_tumor'
    - name: 'PDL1'
      phenotype: 'PDL1_positive_tumor'
    - name: 'CC3'
      phenotype: 'CC3_positive_tumor'
    
  immune_populations:
    - CD45_positive
    - T_cells
    - CD4_T_cells
    - CD8_T_cells
    - CD8_TRM
    - CD8_cytotoxic
    - CD8_TRM_cytotoxic
    - PD1_positive_CD8
    - KLRG1_positive_CD8
    - CD4_Tregs
    - Macrophages
    - M1_macrophages
    - M2_macrophages
    - B_cells
    - CAFs

# ============================================================================
# ANALYSIS 8: UMAP VISUALIZATION
# ============================================================================
umap_visualization:
  enabled: true

  markers:
    - is_PERK
    - is_NINJA
    - is_KI67
    - is_PDL1
    - is_EPCAM
    - is_TTF1
    - is_CC3
    - is_TOM
    - is_CD45
    - is_CD3E
    - is_CD4
    - is_CD8A
    - is_FOXP3
    - is_CD103
    - is_GZMB
    - is_PD1
    - is_KLRG1
    - is_B220
    - is_F480
    - is_MHCII
    - is_ASMA

  phenotypes:
    - Tumor
    - pERK_positive_tumor
    - NINJA_positive_tumor
    - Ki67_positive_tumor
    - PDL1_positive_tumor
    - CD45_positive
    - T_cells
    - CD4_T_cells
    - CD8_T_cells
    - CD8_TRM
    - CD8_cytotoxic
    - CD8_TRM_cytotoxic
    - PD1_positive_CD8
    - KLRG1_positive_CD8
    - CD4_Tregs
    - B_cells
    - Macrophages
    - M1_macrophages
    - M2_macrophages
    - CAFs

  n_neighbors: 30
  min_dist: 0.3
  n_clusters: 15
  subsample: 100000

# ============================================================================
# ANALYSIS 9: PSEUDOTIME ANALYSIS (NEW)
# ============================================================================
pseudotime_analysis:
  enabled: true
  generate_plots: true

# ============================================================================
# VISUALIZATION SETTINGS
# ============================================================================
visualization:
  enabled: true
  style: 'publication'
  color_palette: 'colorblind_safe'
  font_family: 'Arial'
  font_size: 12
  individual_plots: true
  composite_plots: true
  publication:
    remove_spines: true
    grid: false
    tight_layout: true
    despine: true
  exploratory:
    show_points: true
    alpha: 0.6
    show_stats: true

# ============================================================================
# SPATIAL VISUALIZATION SETTINGS
# ============================================================================
spatial_visualization:
  enabled: true

  # Generate spatial plots for each individual phenotype
  individual_phenotypes: true

  # Generate tumor zone plots (DBSCAN cluster validation)
  tumor_zones: true

  # Generate marker +/- zone plots (e.g., pERK+/- spatial zones)
  marker_zones: true

  # Generate tumor structure plots per sample
  tumor_structures: true

  # Generate multi-phenotype overlay plots
  phenotype_overlays: true

  # Distance histogram settings
  distance_histograms:
    enabled: true
    distance_bins: [0, 50, 100, 200, 300, 500]  # Distance bands in microns

# ============================================================================
# STATISTICAL TESTING
# ============================================================================
statistics:
  enabled: true
  pairwise_test: 'mannwhitneyu'
  correlation_test: 'spearman'
  fdr_correction: 'benjamini_hochberg'
  alpha: 0.05
  report_effect_sizes: true
  effect_size_methods:
    - 'cohens_d'
    - 'rank_biserial'
  confidence_intervals: true
  ci_level: 0.95
  n_bootstrap: 10000
  save_all_tests: true

# ============================================================================
# PERFORMANCE
# ============================================================================
performance:
  n_jobs: -1
  parallel_processing: true
  chunk_size: 10000
  use_kdtree: true
  memory_efficient: true

# ============================================================================
# ADVANCED OPTIONS
# ============================================================================
advanced:
  random_seed: 42
  verbose: true
  log_file: 'spatial_quantification.log'
  checkpointing:
    enabled: true
    frequency: 'per_analysis'
    directory: 'checkpoints'
