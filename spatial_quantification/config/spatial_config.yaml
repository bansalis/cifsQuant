# ============================================================================
# cifsQuant - Spatial Quantification Configuration
# ============================================================================
# Edit this file to configure your analysis. Steps:
#   1. Set input paths to your gated_data.h5ad and sample_metadata.csv
#   2. Define your marker panel under 'phenotypes'
#   3. Set 'enabled: true' for the analyses you want to run
#
# See configs/examples/ for complete study-specific examples.
# ============================================================================

# ============================================================================
# INPUT / OUTPUT
# ============================================================================
input:
  gated_data: 'manual_gating_output/gated_data.h5ad'
  metadata: 'sample_metadata.csv'

output:
  base_directory: 'spatial_quantification_results'
  save_intermediate: true
  formats: ['png']
  dpi: 300

# ============================================================================
# PLOT CUSTOMIZATION
# ============================================================================
plotting:
  font_family: 'DejaVu Sans'
  font_size: 11
  title_size: 14
  show_stats: true
  stat_method: 'mann_whitney'
  fdr_correction: true
  significance_symbols:
    0.001: '***'
    0.01:  '**'
    0.05:  '*'
    1.0:   'ns'
  # Define one color per group value in your sample_metadata.csv
  group_colors:
    GroupA: '#E41A1C'
    GroupB: '#377EB8'
    treated: '#4DAF4A'
    untreated: '#FF7F00'

# ============================================================================
# PRIMARY STRUCTURE DEFINITION
# ============================================================================
# Define what the primary spatial structure is in your tissue
# (e.g. tumors, lymphoid follicles, germinal centers)
tumor_definition:
  base_phenotype: 'Primary_Structure'
  required_positive: ['STRUCTURE_MARKER']    # marker that defines the structure
  required_negative: []
  structure_detection:
    method: 'DBSCAN'
    eps: 1000             # µm radius for clustering
    min_samples: 500      # minimum cells to form a structure
    min_cluster_size: 250
    boundary_buffer: 100
    use_expanded_boundary: true
    alpha: 100
    min_edges: 20
    holes_min_edges: 200

# ============================================================================
# METADATA CONFIGURATION
# ============================================================================
metadata:
  sample_column: 'sample_id'
  group_column: 'group'
  timepoint_column: 'timepoint'
  treatment_column: 'treatment'      # optional; omit if no treatment dimension
  additional_groupings: []           # e.g. ['genotype', 'main_group']

# ============================================================================
# PHENOTYPE DEFINITIONS
# ============================================================================
# Define cell populations using positive/negative marker combinations.
# Marker names must match your markers.csv exactly.
# 'base' allows building sub-populations from a parent phenotype.
phenotypes:

  # Primary structure cells
  Primary_Structure:
    description: "Primary structure cells (e.g. tumor, follicle)"
    positive: ['STRUCTURE_MARKER']
    negative: []

  Structure_Marker1_pos:
    description: "Structure cells positive for Marker1"
    base: 'Primary_Structure'
    positive: ['MARKER1']

  Structure_Marker1_neg:
    description: "Structure cells negative for Marker1"
    base: 'Primary_Structure'
    negative: ['MARKER1']

  # Immune populations
  All_Immune:
    description: "All immune cells (e.g. CD45+)"
    positive: ['IMMUNE_MARKER']
    negative: []

  T_cells:
    description: "T cells"
    positive: ['T_CELL_MARKER']
    negative: []

  CD8_T_cells:
    description: "CD8+ cytotoxic T cells"
    positive: ['T_CELL_MARKER', 'CD8_MARKER']
    negative: []

  CD4_T_cells:
    description: "CD4+ helper T cells"
    positive: ['T_CELL_MARKER', 'CD4_MARKER']
    negative: []

# ============================================================================
# ANALYSIS 0: PER-STRUCTURE ANALYSIS
# ============================================================================
per_tumor_analysis:
  enabled: false
  use_spatialcells: true
  generate_plots: true
  generate_spatial_plots: false

  immune_populations:
    - All_Immune
    - T_cells
    - CD8_T_cells
    - CD4_T_cells

  export_groups: []          # leave empty to export all groups
  export_timepoint: null     # null = all timepoints

  markers:
    - name: 'Marker1'
      phenotype: 'Structure_Marker1_pos'

# ============================================================================
# ANALYSIS 1: PERK MFI ANALYSIS
# ============================================================================
perk_mfi_analysis:
  enabled: false
  marker: 'MARKER1'
  t_cell_phenotype: 'CD8_T_cells'
  structure_phenotype: 'Primary_Structure'

# ============================================================================
# ANALYSIS 2: UMAP VISUALIZATION
# ============================================================================
umap_visualization:
  enabled: false
  n_components: 2
  n_neighbors: 15
  min_dist: 0.1
  markers_to_show: []

# ============================================================================
# ANALYSIS 3: SPATIAL PERMUTATION TESTING
# ============================================================================
spatial_permutation:
  enabled: false
  generate_plots: true
  n_permutations: 500
  structure_column: 'tumor_structure_id'
  min_cells_per_structure: 50

  tests:
    clustering:
      enabled: true
      phenotypes: ['Primary_Structure', 'All_Immune']
    colocalization:
      enabled: true
      pairs:
        - [Structure_Marker1_pos, CD8_T_cells]
    immune_enrichment:
      enabled: true
      source_phenotype: 'Primary_Structure'
      target_phenotypes: ['T_cells', 'CD8_T_cells']

  comparisons:
    - name: 'GroupA_vs_GroupB'
      column: 'group'
      groups: ['GroupA', 'GroupB']

# ============================================================================
# ANALYSIS 4: TEMPORAL ANALYSIS
# ============================================================================
temporal_analysis:
  enabled: false

# ============================================================================
# ANALYSIS 5: CLUSTER COMPOSITION ANALYSIS
# ============================================================================
cluster_composition_analysis:
  enabled: false
  immune_populations:
    - All_Immune
    - T_cells
    - CD8_T_cells
    - CD4_T_cells

# ============================================================================
# ANALYSIS 6: COMPREHENSIVE COEXPRESSION
# ============================================================================
coexpression_analysis:
  enabled: false

# ============================================================================
# ANALYSIS 7: SPATIAL OVERLAP ANALYSIS
# ============================================================================
spatial_overlap_analysis:
  enabled: false

# ============================================================================
# ANALYSIS 8: POPULATION DYNAMICS
# ============================================================================
population_dynamics:
  enabled: false
  populations: []              # empty = use all defined phenotypes

  comparisons:
    - name: 'GroupA_vs_GroupB'
      column: 'group'
      groups: ['GroupA', 'GroupB']
      test_per_timepoint: true

# ============================================================================
# ANALYSIS 9: DISTANCE ANALYSIS
# ============================================================================
distance_analysis:
  enabled: false
  source_phenotypes:
    - T_cells
    - CD8_T_cells
  target_phenotypes:
    - Structure_Marker1_pos
    - Structure_Marker1_neg

# ============================================================================
# ANALYSIS 10: DISTANCE PERMUTATION TESTING
# ============================================================================
distance_permutation_testing:
  enabled: false
  generate_plots: true
  n_permutations: 500

# ============================================================================
# ANALYSIS 11: IMMUNE INFILTRATION
# ============================================================================
immune_infiltration:
  enabled: false
  use_spatialcells: true       # true = SpatialCells-based; false = optimized Getis-Ord

  immune_populations:
    - All_Immune
    - T_cells
    - CD8_T_cells

# ============================================================================
# ANALYSIS 12: CELLULAR NEIGHBORHOODS
# ============================================================================
cellular_neighborhoods:
  enabled: false
  k_neighbors: 15
  n_neighborhoods: 10

# ============================================================================
# ANALYSIS 13: NEIGHBORHOOD PERMUTATION TESTING
# ============================================================================
neighborhood_permutation_testing:
  enabled: false
  generate_plots: true
  n_permutations: 500

# ============================================================================
# ANALYSIS 14: ENHANCED NEIGHBORHOOD ANALYSIS
# ============================================================================
enhanced_neighborhoods:
  enabled: false
  generate_plots: true
  marker_phenotypes:
    - Structure_Marker1_pos
    - Structure_Marker1_neg

# ============================================================================
# ANALYSIS 15: TUMOR MICROENVIRONMENT
# ============================================================================
tumor_microenvironment:
  enabled: false
  generate_plots: true
  distance_bins: [20, 100, 500]    # µm: contact, close, distal
  immune_populations:
    - T_cells
    - CD8_T_cells

# ============================================================================
# ANALYSIS 16: PSEUDOTIME ANALYSIS
# ============================================================================
pseudotime_analysis:
  enabled: false
  generate_plots: true

# ============================================================================
# ANALYSIS 17: MARKER REGION ANALYSIS
# ============================================================================
marker_region_analysis:
  enabled: false
  generate_plots: true
  markers:
    - name: 'Marker1'
      positive_phenotype: 'Structure_Marker1_pos'
      negative_phenotype: 'Structure_Marker1_neg'

# ============================================================================
# ANALYSIS 18: MARKER CLUSTERING ANALYSIS
# ============================================================================
marker_clustering_analysis:
  enabled: false
  generate_plots: true

# ============================================================================
# STATISTICS
# ============================================================================
statistics:
  test: 'mann_whitney'
  fdr_method: 'benjamini-hochberg'
  alpha: 0.05
  effect_size: true
  confidence_intervals: true
  ci_method: 'bootstrap'
  n_bootstrap: 1000

# ============================================================================
# VISUALIZATION
# ============================================================================
visualization:
  enabled: true
  spatial_plots: false
  phenotype_maps: false

spatial_visualization:
  enabled: false
  phenotypes_to_plot: []
  point_size: 1
  alpha: 0.6

# ============================================================================
# PERFORMANCE
# ============================================================================
performance:
  n_jobs: -1               # -1 = use all available cores
  use_kdtree: true
  chunk_size: 10000
  memory_efficient: true
