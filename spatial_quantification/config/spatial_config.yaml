# ============================================================================
# SPATIAL QUANTIFICATION CONFIGURATION - BALT/TLS ANALYSIS
# ============================================================================
# Based on viral-induced lung B cell aggregate literature
# Key refs: Moyron-Quiroz et al., Randall et al., GeurtsvanKessel et al.

# ============================================================================
# INPUT/OUTPUT
# ============================================================================
input:
  gated_data: 'manual_gating_output/gated_data.h5ad'
  metadata: 'sample_metadata.csv'

output:
  base_directory: 'b_cell_cluster_analysis'
  save_intermediate: true
  formats: ['png']
  dpi: 300

# ============================================================================
# PLOT CUSTOMIZATION
# ============================================================================
plotting:
  font_family: 'DejaVu Sans'
  font_size: 11
  title_size: 14
  show_stats: true
  stat_method: 'mann_whitney'
  fdr_correction: true
  significance_symbols:
    0.001: '***'
    0.01: '**'
    0.05: '*'
    1.0: 'ns'

# ============================================================================
# B CELL CLUSTER DEFINITION (equivalent to tumor_definition)
# ============================================================================
structure_definition:
  base_phenotype: 'B_cells'
  required_positive: ['B220']
  required_negative: []
  structure_detection:
    method: 'DBSCAN'
    eps: 100
    min_samples: 50
    min_cluster_size: 100
    boundary_buffer: 50
    use_expanded_boundary: true
    alpha: 100

# ============================================================================
# METADATA CONFIGURATION
# ============================================================================
metadata:
  sample_column: 'sample_id'
  group_column: 'group'
  timepoint_column: 'timepoint'
  additional_groupings: []

# ============================================================================
# PHENOTYPE DEFINITIONS
# ============================================================================
phenotypes:
  # ============================================================================
  # B CELL POPULATIONS
  # ============================================================================
  B_cells:
    description: "All B cells"
    positive: ['B220']
    negative: []

  Naive_B_cells:
    description: "Naive IgD+ B cells"
    positive: ['B220', 'IgD']
    negative: ['GL7', 'BCL6']

  Follicular_B_cells:
    description: "Follicular B cells (CD21+CD23+IgD+)"
    positive: ['B220', 'CD21', 'CD23', 'IgD']
    negative: ['GL7']

  GC_B_cells:
    description: "Germinal center B cells"
    positive: ['B220', 'GL7', 'BCL6']
    negative: ['IgD']

  Proliferating_GC_B:
    description: "Proliferating GC B cells"
    positive: ['B220', 'GL7', 'BCL6', 'KI67']
    negative: []

  Non_proliferating_GC_B:
    description: "Non-proliferating GC B cells"
    positive: ['B220', 'GL7', 'BCL6']
    negative: ['KI67']

  AID_positive_GC_B:
    description: "AID+ GC B (active SHM)"
    positive: ['B220', 'GL7', 'AID']
    negative: []

  Memory_B_cells:
    description: "Memory B cells (IgD- GL7-)"
    positive: ['B220']
    negative: ['IgD', 'GL7', 'BCL6']

  Class_switched_B:
    description: "Class-switched B cells"
    positive: ['B220']
    negative: ['IgD']

  Activated_B_cells:
    description: "Activated B cells"
    positive: ['B220', 'CD23']
    negative: ['GL7']

  Proliferating_non_GC_B:
    description: "Proliferating non-GC B"
    positive: ['B220', 'KI67']
    negative: ['GL7', 'BCL6']

  GL7_positive_B_cells:
    description: "GL7+ B cells for zone analysis"
    positive: ['B220', 'GL7']
    negative: []

  # ============================================================================
  # T CELL POPULATIONS
  # ============================================================================
  T_cells:
    description: "All T cells"
    positive: ['CD3']
    negative: []

  CD4_T_cells:
    description: "CD4+ T cells"
    positive: ['CD3', 'CD4']
    negative: []

  CD8_T_cells:
    description: "CD8+ T cells"
    positive: ['CD3', 'CD8B']
    negative: []

  Tfh_cells:
    description: "Follicular helper T cells"
    positive: ['CD3', 'CD4', 'PD1', 'BCL6']
    negative: ['B220']

  PD1_positive_CD4:
    description: "PD1+ CD4 T cells"
    positive: ['CD3', 'CD4', 'PD1']
    negative: []

  Non_Tfh_CD4:
    description: "Non-Tfh CD4 T cells"
    positive: ['CD3', 'CD4']
    negative: ['PD1', 'BCL6']

  # ============================================================================
  # FOLLICULAR DENDRITIC CELLS
  # ============================================================================
  FDCs:
    description: "Follicular dendritic cells"
    positive: ['CD21', 'CD23']
    negative: ['B220', 'CD3']

  # ============================================================================
  # STRUCTURAL / OTHER
  # ============================================================================
  HEV_positive:
    description: "High endothelial venule marker"
    positive: ['PNAD']
    negative: []

  All_proliferating:
    description: "All proliferating cells"
    positive: ['KI67']
    negative: []

# ============================================================================
# ANALYSIS 0: PER-CLUSTER ANALYSIS (B cell clusters)
# ============================================================================
per_structure_analysis:
  enabled: true
  use_spatialcells: true
  generate_plots: true

  markers:
    - name: 'GL7'
      phenotype: 'GL7_positive_B_cells'
    - name: 'GC_B'
      phenotype: 'GC_B_cells'
    - name: 'Tfh'
      phenotype: 'Tfh_cells'
    - name: 'FDC'
      phenotype: 'FDCs'
    - name: 'Proliferating'
      phenotype: 'All_proliferating'

  spatial_heterogeneity:
    enabled: true
    window_size: 300
    step_size: 300
    min_cells: 10
    phenotype_col: 'is_GC_B_cells'

# ============================================================================
# ANALYSIS 1: POPULATION DYNAMICS (TEMPORAL)
# ============================================================================
population_dynamics:
  enabled: true
  populations:
    # B cell populations
    - B_cells
    - Naive_B_cells
    - Follicular_B_cells
    - GC_B_cells
    - Proliferating_GC_B
    - Non_proliferating_GC_B
    - AID_positive_GC_B
    - Memory_B_cells
    - Class_switched_B
    - Activated_B_cells
    - Proliferating_non_GC_B
    # T cell populations
    - T_cells
    - CD4_T_cells
    - CD8_T_cells
    - Tfh_cells
    - PD1_positive_CD4
    - Non_Tfh_CD4
    # Stromal
    - FDCs
    - HEV_positive
    # Other
    - All_proliferating

  fractional_populations:
    # B cell fractions (relative to total B cells)
    Naive_B_cells: B_cells
    Follicular_B_cells: B_cells
    GC_B_cells: B_cells
    Memory_B_cells: B_cells
    Class_switched_B: B_cells
    Activated_B_cells: B_cells
    Proliferating_non_GC_B: B_cells
    # GC B cell fractions
    Proliferating_GC_B: GC_B_cells
    Non_proliferating_GC_B: GC_B_cells
    AID_positive_GC_B: GC_B_cells
    # T cell fractions
    CD4_T_cells: T_cells
    CD8_T_cells: T_cells
    Tfh_cells: CD4_T_cells
    PD1_positive_CD4: CD4_T_cells
    Non_Tfh_CD4: CD4_T_cells

  comparisons:
    - name: 'Timepoint_comparison'
      groups: ['flu']  # Will be populated from metadata

  metrics:
    - 'count'
    - 'density'
    - 'fraction'

  statistics:
    test_per_timepoint: true
    test_method: 'kruskal'
    alpha: 0.05
    fdr_correction: 'benjamini_hochberg'
    pairwise_comparisons: true

# ============================================================================
# ANALYSIS 2: CELL-TO-CELL DISTANCE ANALYSIS
# ============================================================================
distance_analysis:
  enabled: true

  pairings:
    # Tfh to GC B cells
    - source: 'Tfh_cells'
      targets: ['GC_B_cells', 'Proliferating_GC_B', 'AID_positive_GC_B', 'Non_proliferating_GC_B']

    # FDCs to B cell populations
    - source: 'FDCs'
      targets: ['B_cells', 'GC_B_cells', 'Naive_B_cells', 'Follicular_B_cells', 'Memory_B_cells']

    # T cells to B cells
    - source: 'CD4_T_cells'
      targets: ['B_cells', 'GC_B_cells', 'Naive_B_cells', 'Memory_B_cells']

    - source: 'CD8_T_cells'
      targets: ['B_cells', 'GC_B_cells', 'Memory_B_cells']

  metrics:
    - 'mean_nearest_neighbor'
    - 'median_nearest_neighbor'
    - 'min_distance'
    - 'distance_distribution'

  levels:
    - 'per_sample'
    - 'per_structure'

  comparisons:
    - name: 'Timepoint_comparison'
      groups: ['flu']

  max_distance_plot: 500

# ============================================================================
# ANALYSIS 3: IMMUNE INFILTRATION (into B cell clusters)
# ============================================================================
immune_infiltration:
  enabled: true
  use_spatialcells: true
  use_optimized: true

  immune_populations:
    - T_cells
    - CD4_T_cells
    - CD8_T_cells
    - Tfh_cells
    - PD1_positive_CD4
    - Non_Tfh_CD4
    - FDCs

  boundaries:
    - 0
    - 50
    - 100
    - 150

  per_structure: true

  comparisons:
    - name: 'Timepoint_comparison'
      groups: [ ]

  immune_community_detection:
    enabled: true
    eps: 130
    min_samples: 20
    alpha: 130
    min_area: 30000

# ============================================================================
# ANALYSIS 4: GL7 ZONE ANALYSIS (marker region analysis)
# ============================================================================
marker_region_analysis:
  enabled: true
  generate_plots: true

  markers:
    - name: 'GL7'
      positive_col: 'is_GL7_positive_B_cells'
      negative_col: 'is_GL7_negative_B_cells'

  region_detection:
    eps: 50
    min_samples: 20
    alpha: 50
    core_only: true
    min_area: 1000
    min_edges: 5
    holes_min_area: 200
    holes_min_edges: 5

  phenotype_columns:
    - 'is_B_cells'
    - 'is_Naive_B_cells'
    - 'is_Follicular_B_cells'
    - 'is_GC_B_cells'
    - 'is_Proliferating_GC_B'
    - 'is_Non_proliferating_GC_B'
    - 'is_AID_positive_GC_B'
    - 'is_Memory_B_cells'
    - 'is_Class_switched_B'
    - 'is_Activated_B_cells'
    - 'is_Proliferating_non_GC_B'
    - 'is_T_cells'
    - 'is_CD4_T_cells'
    - 'is_CD8_T_cells'
    - 'is_Tfh_cells'
    - 'is_PD1_positive_CD4'
    - 'is_Non_Tfh_CD4'
    - 'is_FDCs'

  immune_populations:
    - 'is_Tfh_cells'
    - 'is_CD4_T_cells'
    - 'is_CD8_T_cells'
    - 'is_PD1_positive_CD4'
    - 'is_Non_Tfh_CD4'
    - 'is_FDCs'

  analyze_holes: false

# ============================================================================
# ANALYSIS 4B: SPATIAL PERMUTATION TESTING
# ============================================================================
# Monte Carlo permutation testing to determine if spatial patterns are
# biologically meaningful or artifacts of random chance.
#
# KEY CONCEPT: Tests run WITHIN each tumor structure (e.g., B cell cluster).
# Question: "Are pERK+ cells clustered within this tumor?"
# NOT: "Is this pERK+ region statistically significant?"
spatial_permutation:
  enabled: false
  generate_plots: true

  # CRITICAL: Specify the column containing tumor structure IDs
  # This should match the output from per_structure_analysis
  # Typical values: 'tumor_structure_id', 'B_cells_structure_id', 'cluster_id'
  structure_column: tumor_structure_id

  # Test configurations
  # Available test types: clustering, colocalization, enrichment
  tests:
    # Single marker clustering - Are marker+ cells spatially clustered?
    - type: clustering
      name: GL7_clustering
      marker: is_GL7_positive_B_cells

    - type: clustering
      name: Ki67_clustering
      marker: is_All_proliferating

    # Two-marker co-localization - Do markers overlap more than chance?
    - type: colocalization
      name: GL7_Ki67_overlap
      marker1: is_GL7_positive_B_cells
      marker2: is_All_proliferating
      radius: 30  # Distance threshold for cross-K function

    # Immune-marker enrichment - Are immune cells enriched near marker+ B cells?
    - type: enrichment
      name: Tfh_near_GL7
      tumor_marker: is_GL7_positive_B_cells
      immune_phenotype: is_Tfh_cells
      radius: 50

  # Statistical parameters
  parameters:
    n_permutations: 500        # Number of Monte Carlo permutations
    min_tumor_cells: 20        # Minimum cells per tumor for testing
    alpha: 0.05                # Significance threshold
    min_prevalence: 0.05       # Minimum marker prevalence (5%)
    max_prevalence: 0.95       # Maximum marker prevalence (95%)
    enrichment_radius: 50      # Default radius for enrichment tests (um)
    clustering_radius: 30      # Default radius for clustering metrics (um)
    max_structures: 500        # Safety limit - fail if more structures than this
    colocalization_radius: 30  # Default radius for co-localization (um)

  # Grouping for cross-sample comparisons
  grouping:
    split_by:
      - group
      - timepoint
    aggregate: true  # Aggregate results across tumors within samples

# ============================================================================
# ANALYSIS 5: CELLULAR NEIGHBORHOODS
# ============================================================================
cellular_neighborhoods:
  enabled: true
  use_optimized: true

  populations:
    # B cell populations
    - B_cells
    - Naive_B_cells
    - Follicular_B_cells
    - GC_B_cells
    - Proliferating_GC_B
    - AID_positive_GC_B
    - Memory_B_cells
    - Activated_B_cells
    # T cell populations
    - T_cells
    - CD4_T_cells
    - CD8_T_cells
    - Tfh_cells
    - PD1_positive_CD4
    - Non_Tfh_CD4
    # Stromal
    - FDCs

  window_size: 100
  k_neighbors: 30
  cells_per_sample: 100000
  n_clusters: 12
  clustering_method: 'kmeans'
  define_globally: true

  analyses:
    - 'composition'
    - 'infiltration'
    - 'spatial_distribution'

  comparisons:
    - name: 'Timepoint_comparison'
      groups: [ ]

# ============================================================================
# ANALYSIS 6: CLUSTER IMMUNE COMPOSITION (stacked bar)
# ============================================================================
cluster_composition_analysis:
  enabled: true
  generate_plots: true

  populations:
    # B cell development stages
    - Naive_B_cells
    - Follicular_B_cells
    - GC_B_cells
    - Memory_B_cells
    - Activated_B_cells
    # GC activity markers
    - Proliferating_GC_B
    - AID_positive_GC_B
    # T cell help
    - Tfh_cells
    - CD4_T_cells
    - CD8_T_cells
    # Stromal
    - FDCs

  visualization:
    stacked_bar: true
    normalize: true
    group_by_timepoint: true

# ============================================================================
# ANALYSIS 7: ENHANCED NEIGHBORHOODS
# ============================================================================
enhanced_neighborhoods:
  enabled: true

  neighborhood_radius: 50

  markers:
    - name: 'GL7'
      pos_col: 'is_GL7_positive_B_cells'
      neg_col: 'is_GL7_negative_B_cells'

    - name: 'GC'
      pos_col: 'is_GC_B_cells'
      neg_col: 'is_Non_GC_B_cells'

  cell_types:
    - B_cells
    - Naive_B_cells
    - Follicular_B_cells
    - GC_B_cells
    - Memory_B_cells
    - Activated_B_cells
    - T_cells
    - CD4_T_cells
    - CD8_T_cells
    - Tfh_cells
    - FDCs

  immune_cells:
    - T_cells
    - CD4_T_cells
    - CD8_T_cells
    - Tfh_cells
    - PD1_positive_CD4
    - Non_Tfh_CD4

# ============================================================================
# ANALYSIS 8: TEMPORAL METRICS
# ============================================================================
temporal_analysis:
  enabled: true

  cluster_metrics:
    - 'cluster_count'
    - 'cluster_size'
    - 'total_b_cells'
    - 'cluster_area'
    - 'cluster_density'

  gl7_metrics:
    - 'percent_gl7_positive_clusters'
    - 'gl7_region_count'
    - 'gl7_region_size'
    - 'mean_tfh_per_gl7_region'
    - 'tfh_to_gc_b_ratio'

# ============================================================================
# VISUALIZATION SETTINGS
# ============================================================================
visualization:
  enabled: true
  style: 'publication'
  color_palette: 'colorblind_safe'
  font_family: 'Arial'
  font_size: 12
  individual_plots: true
  composite_plots: true
  publication:
    remove_spines: true
    grid: false
    tight_layout: true
    despine: true
  exploratory:
    show_points: true
    alpha: 0.6
    show_stats: true

# ============================================================================
# SPATIAL VISUALIZATION SETTINGS
# ============================================================================
spatial_visualization:
  enabled: true
  raw_fluorescence: true
  individual_phenotypes: true
  structure_zones: true
  marker_zones: true
  b_cell_clusters: true
  phenotype_overlays: true

  distance_histograms:
    enabled: true
    distance_bins: [0, 50, 100, 200, 300, 500]

# ============================================================================
# STATISTICAL TESTING
# ============================================================================
statistics:
  enabled: true
  pairwise_test: 'mannwhitneyu'
  multigroup_test: 'kruskal'
  correlation_test: 'spearman'
  fdr_correction: 'benjamini_hochberg'
  alpha: 0.05
  report_effect_sizes: true
  effect_size_methods:
    - 'cohens_d'
    - 'rank_biserial'
  confidence_intervals: true
  ci_level: 0.95
  n_bootstrap: 10000
  save_all_tests: true

# ============================================================================
# PERFORMANCE
# ============================================================================
performance:
  n_jobs: -1
  parallel_processing: true
  chunk_size: 10000
  use_kdtree: true
  memory_efficient: true

# ============================================================================
# ADVANCED OPTIONS
# ============================================================================
advanced:
  random_seed: 42
  verbose: true
  log_file: 'balt_tls_analysis.log'
  checkpointing:
    enabled: true
    frequency: 'per_analysis'
    directory: 'checkpoints'
